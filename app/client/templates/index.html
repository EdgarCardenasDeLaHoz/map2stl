<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Maps Globe Selector</title>
    <link rel="stylesheet" href="/static/vendor/leaflet.css" />
    <link rel="stylesheet" href="/static/vendor/leaflet-draw.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <!-- PrimeVue icons (loaded from dist; no global CSS needed for Aura unstyled theme) -->
    <link rel="stylesheet" href="/static/vendor/primeicons.css" />
</head>

<body>
    <div class="app-container">
        <button id="openSidebarBtn" class="open-sidebar hidden">☰</button>
        <!-- Stage 3: Sidebar replaced by Vue SidebarPanel.vue — teleported here -->
        <div id="vue-sidebar"></div>

        <!-- Stage 5: Toast container teleported by AppShell.vue -->
        <div id="vue-toast"></div>
        <!-- Stage 5: Region Notes Modal teleported by AppShell.vue -->
        <div id="vue-notes-modal"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Stage 5: MainHeader (title + tabs) teleported by AppShell.vue -->
            <div id="vue-main-header"></div>
            <!-- Stage 5: WorkflowHint teleported by AppShell.vue -->
            <div id="vue-workflow-hint"></div>

            <!-- Stage 6: Content area (map, globe, dem, model) — rendered by ContentArea.vue, teleported here -->
            <div id="vue-content-area"></div>
        </div>
    </div>

    <!-- Vue 3 mount target — positioned outside the existing DOM so it doesn't affect layout -->
    <div id="vue-app"></div>

    <script src="/static/vendor/leaflet.js"></script>
    <script src="/static/vendor/leaflet-draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- vue-main.js loads BEFORE main.js so Pinia store is ready when existing modules run -->
    <script type="module" src="/static/js/vue-main.js"></script>
    <script type="module" src="/static/js/main.js"></script>

    <!-- Load third-party libs from CDN -->
    <script src="https://cdn.plot.ly/plotly-2.29.1.min.js"></script>

    <!-- Dev error overlay: catches uncaught JS errors and shows them on-screen -->
    <div id="devErrorOverlay" style="
        display:none; position:fixed; bottom:0; left:0; right:0; max-height:200px;
        overflow-y:auto; background:rgba(180,0,0,0.92); color:#fff; font:11px/1.4 monospace;
        padding:8px 12px; z-index:99999; white-space:pre-wrap; border-top:2px solid #ff4444;">
        <button onclick="this.parentElement.style.display='none'"
            style="float:right;background:#ff4444;border:none;color:#fff;cursor:pointer;padding:2px 6px;border-radius:3px;">✕</button>
        <strong>JS Errors:</strong>
        <div id="devErrorList"></div>
    </div>
    <script>
        (function() {
            const overlay = document.getElementById('devErrorOverlay');
            const list = document.getElementById('devErrorList');
            function addErr(msg) {
                overlay.style.display = 'block';
                const d = document.createElement('div');
                d.textContent = '• ' + msg;
                list.appendChild(d);
            }
            window.addEventListener('error', e => addErr(e.message + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : '')));
            window.addEventListener('unhandledrejection', e => addErr('Promise: ' + (e.reason?.message || e.reason)));
        })();
    </script>

</body>

</html>
